<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Faculty Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #e0e7ff 0%, #f4f7fb 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #1a2a44;
      padding: 1rem;
    }

    .container {
      background: #ffffff;
      padding: 1.3rem 1.2rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #1a2a44;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #4b5e7a;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .error {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.25rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      justify-content: flex-end;
    }

    .save-btn, .cancel-btn, .back-btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      transition: transform 0.2s, background 0.3s;
    }

    .save-btn {
      background: linear-gradient(90deg, #2563eb, #3b82f6);
      color: white;
    }

    .save-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(90deg, #1d4ed8, #2563eb);
    }

    .cancel-btn, .back-btn {
      background: #e5e7eb;
      color: #1a2a44;
    }

    .cancel-btn:hover, .back-btn:hover {
      transform: translateY(-2px);
      background: #d1d5db;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #10b981;
      color: white;
      padding: 0.8rem 1.2rem;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      transform: translateY(20px);
      z-index: 2000;
      font-size: 0.85rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: #ef4444;
    }

    @media (max-width: 480px) {
      .container {
        padding: 1.5rem;
      }
      .buttons {
        flex-direction: column;
        gap: 0.5rem;
      }
      .save-btn, .cancel-btn, .back-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Edit Faculty Profile</h2>
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:1.5rem;">
      <div id="profilePicPreview" style="width:100px;height:100px;border-radius:50%;background:#e5e7eb;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 2px 8px rgba(37,99,235,0.08);margin-bottom:0.7rem;">
        <img id="profilePicImg" src="" alt="Profile Picture" style="width:100%;height:100%;object-fit:cover;display:none;" />
        <i id="profilePicIcon" class="fas fa-user-circle" style="font-size:70px;color:#2563eb;"></i>
      </div>
      <label for="profilePicInput" style="cursor:pointer;color:#2563eb;font-weight:500;">Change Photo</label>
      <input type="file" id="profilePicInput" accept="image/*" style="display:none;" />
    </div>
    <form id="editForm">
      <div class="form-group">
        <label for="editName">Name</label>
        <input type="text" id="editName" required />
        <div id="nameError" class="error"></div>
      </div>
      <div class="form-group">
        <label for="editEmail">Email</label>
        <input type="email" id="editEmail" required />
        <div id="emailError" class="error"></div>
      </div>
      <div class="form-group">
        <label for="editContact">Contact Number</label>
        <input type="tel" id="editContact" pattern="[0-9]{10}" required />
        <div id="contactError" class="error"></div>
      </div>
      <div class="form-group">
        <label for="editDepartment">Department</label>
        <input type="text" id="editDepartment" required />
        <div id="departmentError" class="error"></div>
      </div>
      <div class="form-group">
        <label for="editDesignation">Designation</label>
        <input type="text" id="editDesignation" required />
        <div id="designationError" class="error"></div>
      </div>
      <hr style="margin:1.5rem 0 1rem 0;border:none;border-top:1px solid #e5e7eb;" />
      <div class="buttons" style="justify-content:center;">
        <button type="submit" class="save-btn"><i class="fas fa-save"></i> Save Changes</button>
        <button type="button" class="cancel-btn" onclick="window.location.href='faculty.html'"><i class="fas fa-times"></i> Cancel</button>
        <button type="button" class="back-btn" onclick="window.location.href='faculty.html'"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
      </div>
    </form>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      loadProfileData();
      loadProfilePicture();
      const editForm = document.getElementById("editForm");
      if (editForm) {
        editForm.addEventListener("submit", handleFormSubmit);
      }
      document.getElementById("profilePicInput").addEventListener("change", handlePicChange);
    });

    function loadProfileData() {
      // Get faculty data from login (stored in localStorage as facultyData)
      const facultyData = JSON.parse(localStorage.getItem("facultyData"));
      
      if (facultyData) {
        // Use actual logged-in faculty data
        document.getElementById("editName").value = facultyData.name || '';
        document.getElementById("editEmail").value = facultyData.email || '';
        document.getElementById("editDepartment").value = facultyData.department || '';
        document.getElementById("editDesignation").value = facultyData.designation || '';
        
        // Load additional profile data if exists
        const profileData = JSON.parse(localStorage.getItem("facultyProfile")) || {};
        document.getElementById("editContact").value = profileData.contact || '';
      } else {
        // Fallback to default data if no login data found
        const defaultProfileData = {
          name: "Guest Faculty",
          email: "not@logged.in",
          contact: "Not provided",
          department: "Not specified",
          designation: "Not specified"
        };
        document.getElementById("editName").value = defaultProfileData.name;
        document.getElementById("editEmail").value = defaultProfileData.email;
        document.getElementById("editContact").value = defaultProfileData.contact;
        document.getElementById("editDepartment").value = defaultProfileData.department;
        document.getElementById("editDesignation").value = defaultProfileData.designation;
      }
    }

    function loadProfilePicture() {
      const savedPic = localStorage.getItem("facultyProfilePicture");
      const img = document.getElementById("profilePicImg");
      const icon = document.getElementById("profilePicIcon");
      if (savedPic) {
        img.src = savedPic;
        img.style.display = "block";
        icon.style.display = "none";
      } else {
        img.style.display = "none";
        icon.style.display = "block";
      }
    }

    function handlePicChange(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          localStorage.setItem("facultyProfilePicture", e.target.result);
          loadProfilePicture();
        };
        reader.readAsDataURL(file);
      }
    }

    function validateForm() {
      let isValid = true;
      const name = document.getElementById("editName").value.trim();
      const email = document.getElementById("editEmail").value.trim();
      const contact = document.getElementById("editContact").value.trim();
      const department = document.getElementById("editDepartment").value.trim();
      const designation = document.getElementById("editDesignation").value.trim();

      document.querySelectorAll(".error").forEach((el) => (el.textContent = ""));

      if (!name) {
        document.getElementById("nameError").textContent = "Name is required";
        isValid = false;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !emailRegex.test(email)) {
        document.getElementById("emailError").textContent = "Please enter a valid email";
        isValid = false;
      }

      const contactRegex = /^[0-9]{10}$/;
      if (!contact || !contactRegex.test(contact)) {
        document.getElementById("contactError").textContent = "Please enter a valid 10-digit contact number";
        isValid = false;
      }

      if (!department) {
        document.getElementById("departmentError").textContent = "Department is required";
        isValid = false;
      }

      if (!designation) {
        document.getElementById("designationError").textContent = "Designation is required";
        isValid = false;
      }

      return isValid;
    }

    function handleFormSubmit(e) {
      e.preventDefault();
      if (!validateForm()) return;

      // Get current logged-in faculty data
      const facultyData = JSON.parse(localStorage.getItem("facultyData"));
      
      if (!facultyData) {
        showToast("No user logged in. Please login again.", "error");
        setTimeout(() => {
          window.location.href = "faculty-login.html";
        }, 1000);
        return;
      }

      const profileData = {
        name: document.getElementById("editName").value.trim(),
        faculty_id: facultyData.faculty_id,
        email: document.getElementById("editEmail").value.trim(),
        contact: document.getElementById("editContact").value.trim(),
        department: document.getElementById("editDepartment").value.trim(),
        designation: document.getElementById("editDesignation").value.trim(),
      };

      // Update localStorage for immediate display
      localStorage.setItem("facultyProfile", JSON.stringify(profileData));
      
      // Update facultyData with new info
      facultyData.name = profileData.name;
      facultyData.email = profileData.email;
      facultyData.department = profileData.department;
      facultyData.designation = profileData.designation;
      localStorage.setItem("facultyData", JSON.stringify(facultyData));

      // Send update to database
      updateFacultyProfile(profileData);
    }

    async function updateFacultyProfile(profileData) {
      try {
        const formData = new FormData();
        formData.append('faculty_id', profileData.faculty_id);
        formData.append('name', profileData.name);
        formData.append('email', profileData.email);
        formData.append('contact', profileData.contact);
        formData.append('department', profileData.department);
        formData.append('designation', profileData.designation);

        const response = await fetch('api/update_faculty_profile.php', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          showToast("Profile updated successfully in database!");
          setTimeout(() => {
            window.location.href = "faculty.html";
          }, 1000);
        } else {
          showToast("Profile saved locally but database update failed: " + result.message, "error");
          setTimeout(() => {
            window.location.href = "faculty.html";
          }, 2000);
        }
      } catch (error) {
        console.error("Error updating profile:", error);
        showToast("Profile saved locally. Database update failed.", "error");
        setTimeout(() => {
          window.location.href = "faculty.html";
        }, 2000);
      }
    }

    function showToast(message, type = "success") {
      const toast = document.getElementById("toast");
      if (!toast) return;
      toast.textContent = message;
      toast.className = `toast show ${type === "error" ? "error" : ""}`;
      setTimeout(() => {
        toast.className = "toast";
      }, 3000);
    }
  </script>
</body>
</html>
